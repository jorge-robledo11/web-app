services:
  db:
    image: postgres:16-alpine
    container_name: realtor-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtor
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
