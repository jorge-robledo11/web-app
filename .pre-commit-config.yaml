fail_fast: true

default_language_version:
  python: python3.13

repos:
  # 1. Modernización de sintaxis Python
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py313-plus]

  # 2. Ruff: lint/autofix + format sobre archivos Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  # 3. Docstrings single-line a multilínea después de ruff-format
  - repo: local
    hooks:
      - id: format-docstrings
        name: formatear docstrings a multilínea
        entry: uv run python scripts/ci/format-docstrings.py
        language: system
        types: [python]
        pass_filenames: true

  # 4. Verificaciones generales de archivos
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-ast
      - id: debug-statements
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=750]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
        exclude: ^app/static/vendor/htmx\.min\.js$
      - id: trailing-whitespace
        exclude: ^app/static/vendor/htmx\.min\.js$

  # 5. Validación de docstrings
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        types: [python]

  # 6. Checks del proyecto usando scripts separados
  - repo: local
    hooks:
      - id: forbid-yml-files
        name: prohibir archivos .yml
        entry: bash scripts/ci/forbid-yml-files.sh
        language: system
        pass_filenames: false

      - id: forbid-python-packaging-files
        name: prohibir requirements.txt y setup.py
        entry: bash -c 'test ! -e requirements.txt && test ! -e setup.py'
        language: system
        pass_filenames: false

      - id: typecheck
        name: typecheck del proyecto
        entry: uv run mypy --strict app/modules/
        language: system
        pass_filenames: false

      - id: test
        name: tests del proyecto
        entry: bash scripts/ci/test.sh
        language: system
        pass_filenames: false
        stages: [manual]

      - id: coverage
        name: coverage del proyecto
        entry: bash scripts/ci/coverage.sh
        language: system
        pass_filenames: false
        stages: [manual]

      - id: visual-trace-check
        name: check visual trace
        entry: bash scripts/tools/check-visual-trace.sh
        language: system
        pass_filenames: false
        stages: [manual]

      - id: clean
        name: limpiar caches del proyecto
        entry: bash scripts/ci/clean.sh
        language: system
        pass_filenames: false
        stages: [manual]
